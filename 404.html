<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404: Signal Lost | Sidhant Pande</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .error-page {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: var(--bg-dark);
            overflow: hidden;
            position: relative;
        }
        .error-content {
            z-index: 2;
            padding: 2rem;
        }
        .error-code {
            font-size: clamp(8rem, 20vw, 15rem);
            font-weight: 900;
            line-height: 1;
            margin-bottom: 1rem;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-family: var(--font-accent);
            opacity: 0.1;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
        }
        .error-title {
            font-size: clamp(2rem, 5vw, 3.5rem);
            margin-bottom: 1.5rem;
            color: var(--text-bright);
        }
        .error-desc {
            font-size: 1.1rem;
            color: var(--text-muted);
            max-width: 500px;
            margin: 0 auto 2.5rem;
        }
        .error-visual {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            opacity: 0.3;
        }
    </style>
</head>
<body class="error-page">
    <div class="error-code">404</div>
    <div class="error-content reveal-up">
        <h1 class="error-title">Signal <span class="gradient-text">Lost.</span></h1>
        <p class="error-desc">The path you're looking for doesn't exist in our current architecture. Let's get you back to the main system.</p>
        <div class="error-actions">
            <a href="" class="btn btn-primary">Return to Home</a>
            <a href="projects.html" class="btn btn-secondary">Explore Projects</a>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="script.js"></script>
    <script>
        // Custom 404 animation
        gsap.from(".error-content", {
            opacity: 0,
            y: 50,
            duration: 1.5,
            ease: "expo.out"
        });
    </script>
</body>
</html>
